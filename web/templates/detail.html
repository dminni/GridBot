<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridBot - Asset Analysis</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/static/js/lightweight-charts.js"></script>
    <style>
        .detail-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            height: calc(100vh - 140px);
        }
        .chart-container {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            padding-right: 8px;
        }
        .score-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: rgba(16, 185, 129, 0.1);
            border-left: 4px solid var(--accent-green);
            border-radius: 8px;
        }
        .score-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--accent-green);
        }
        .config-card {
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .config-card:hover {
            border-color: var(--accent-blue);
        }
        .config-card.selected {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
        }
        #chart-legend {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 10;
            color: #d1d5db;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo-text">GridBot</h1>
            </div>
            <nav class="nav-menu">
                <a href="/" class="nav-link">Dashboard</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <a href="/" class="btn btn-sm" style="background: var(--bg-panel-hover); color: white;">&larr; Volver</a>
                    <h2 class="page-title" id="asset-title">Cargando...</h2>
                </div>
            </header>

            <div class="content-area">
                <div class="detail-layout">
                    <!-- Left Column: Chart -->
                    <div class="glass-panel" style="padding: 16px; display: flex; flex-direction: column;">
                        <h3 style="margin-bottom: 16px;">Price Action & S/R Levels (1d)</h3>
                        <div id="tvchart" class="chart-container">
                            <div id="chart-legend"></div>
                        </div>
                    </div>

                    <!-- Right Column: Analysis & Simulation -->
                    <div class="panel">
                        <div class="glass-panel" style="padding: 20px;">
                            <h3 style="margin-bottom: 16px;">Grid Fitness Score</h3>
                            <div class="score-box" id="score-box">
                                <div>
                                    <div style="color: var(--text-muted); font-size: 14px;">Evaluación global</div>
                                    <div id="score-trend" style="font-size: 13px; margin-top: 4px;">Tendencia: --</div>
                                </div>
                                <div class="score-value" id="score-val">--/100</div>
                            </div>
                        </div>

                        <div class="glass-panel" style="padding: 20px;">
                            <h3 style="margin-bottom: 16px;">Configuraciones Sugeridas</h3>
                            <div id="configs-container" style="display: flex; flex-direction: column; gap: 12px;">
                                Cargando configuraciones...
                            </div>
                        </div>

                        <div class="glass-panel" style="padding: 20px;">
                            <h3 style="margin-bottom: 16px;">Simulador (Backtest 1000h)</h3>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
                                <div>
                                    <label style="font-size: 12px; color: var(--text-muted);">Inversión (USDT)</label>
                                    <input type="number" id="sim-capital" value="1000" style="width:100%; padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-dark); color: white;">
                                </div>
                                <div>
                                    <label style="font-size: 12px; color: var(--text-muted);">Fee (%)</label>
                                    <input type="number" id="sim-fee" value="0.1" step="0.05" style="width:100%; padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-dark); color: white;">
                                </div>
                            </div>
                            <button class="btn btn-primary" style="width: 100%; margin-bottom: 16px;" onclick="runSimulation()">Ejecutar Simulación</button>
                            
                            <div id="sim-results" style="display: none; font-size: 14px; color: var(--text-muted);">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><span>Trades:</span> <strong style="color:white" id="sim-trades">--</strong></div>
                                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><span>Comisiones:</span> <strong style="color:white" id="sim-comms">--</strong></div>
                                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><span>Ganancia Neta:</span> <strong style="color:var(--accent-green)" id="sim-net">--</strong></div>
                                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><span>ROI:</span> <strong style="color:var(--accent-green)" id="sim-roi">--</strong></div>
                                <div style="display: flex; justify-content: space-between;"><span>Max Drawdown:</span> <strong style="color:var(--accent-red)" id="sim-dd">--</strong></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/detail.js"></script>
</body>
</html>
